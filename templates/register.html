<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — LinkReport</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 12px; border: 1px solid #e8e8e8; padding: 2rem; width: 100%; max-width: 400px; }
    h1 { font-size: 1.3rem; font-weight: 600; color: #1a1a2e; margin-bottom: 0.25rem; }
    p.sub { font-size: 0.85rem; color: #999; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: #666; margin-bottom: 6px; }
    input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 0.9rem; outline: none; margin-bottom: 1rem; transition: border-color .15s; }
    input:focus { border-color: #1a1a2e; }
    button { width: 100%; background: #1a1a2e; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
    button:hover { opacity: 0.85; }
    .error { background: #fce8e8; color: #c0392b; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
    .footer { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #999; }
    .footer a { color: #1a1a2e; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
<div class="card">
  <h1>Create account</h1>
  <p class="sub">Start verifying your URLs for free</p>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" required autofocus>
    <label>Email (optional)</label>
    <input type="email" name="email">
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Create account</button>
  </form>

  <p class="footer">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
</div>
</body>
</html>
